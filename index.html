<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Web Calculator</title>

<!-- Motor matemático real -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

.dark { background: #111; color: white; }
.light { background: #f4f4f4; color: black; }

#pantalla {
    width: 90%;
    height: 50px;
    font-size: 20px;
    margin: 10px;
    text-align: right;
}

button {
    padding: 10px;
    margin: 4px;
    font-size: 16px;
    cursor: pointer;
}

.menu {
    margin-bottom: 15px;
}

.seccion {
    display: none;
}

.active {
    display: block;
}
</style>
</head>

<body class="light">

<h2>Web Calculator</h2>

<input type="text" id="pantalla">

<br>

<button onclick="calcular()">=</button>
<button onclick="pantalla.value=''">C</button>
<button onclick="cambiarModo()">Modo</button>

<div class="menu">
    <button onclick="mostrarSeccion('basicos')">Básicos</button>
    <button onclick="mostrarSeccion('cientifica')">Científica</button>
    <button onclick="mostrarSeccion('algebra')">Álgebra</button>
</div>

<!-- BASICOS -->
<div id="basicos" class="seccion active">
    <button onclick="agregar('7')">7</button>
    <button onclick="agregar('8')">8</button>
    <button onclick="agregar('9')">9</button>
    <button onclick="agregar('/')">÷</button><br>

    <button onclick="agregar('4')">4</button>
    <button onclick="agregar('5')">5</button>
    <button onclick="agregar('6')">6</button>
    <button onclick="agregar('*')">×</button><br>

    <button onclick="agregar('1')">1</button>
    <button onclick="agregar('2')">2</button>
    <button onclick="agregar('3')">3</button>
    <button onclick="agregar('-')">−</button><br>

    <button onclick="agregar('0')">0</button>
    <button onclick="agregar('.')">.</button>
    <button onclick="agregar('+')">+</button>
</div>

<!-- CIENTIFICA -->
<div id="cientifica" class="seccion">
    <button onclick="agregar('sqrt(')">√</button>
    <button onclick="agregar('cbrt(')">∛</button>
    <button onclick="agregar('sin(')">sin</button>
    <button onclick="agregar('cos(')">cos</button>
    <button onclick="agregar('tan(')">tan</button>
    <button onclick="agregar('log10(')">log</button>
    <button onclick="agregar('log(')">ln</button>
    <button onclick="agregar('pi')">π</button>
    <button onclick="agregar('^')">^</button>
    <button onclick="agregar('!')">!</button>
</div>

<!-- ALGEBRA -->
<div id="algebra" class="seccion">
    <button onclick="agregar('x')">x</button>
    <button onclick="agregar('^2')">x²</button>
    <button onclick="agregar('^3')">x³</button>
    <button onclick="agregar('(')">(</button>
    <button onclick="agregar(')')">)</button>
    <button onclick="agregar('=')">=</button>
</div>

<script>

let pantalla = document.getElementById("pantalla");

function agregar(valor) {
    pantalla.value += valor;
}

function calcular() {

    let input = pantalla.value.trim();
    pantalla.value = "Pensando...";

    setTimeout(() => {
        try {

            input = input.replace(/[xX]/g, "*");

            let resultado = math.evaluate(input);

            pantalla.value = resultado;

        } catch (error) {
            pantalla.value = "No entendido";
        }

    }, 300);
}

function mostrarSeccion(id) {
    document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function cambiarModo() {
    document.body.classList.toggle('dark');
    document.body.classList.toggle('light');
}

</script>

</body>
</html>
